name: Nix CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Check flake
        run: nix flake check

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - id: set-matrix
        run: |
          echo "packages=$(nix flake show --json | jq -c '[
            (.packages."x86_64-linux" // {} | keys[]),
            (.devShells."x86_64-linux" // {} | keys[] | "devShells.x86_64-linux.\(.)")
          ]')" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [flake-check, generate-matrix]
    strategy:
      matrix:
        package: ${{ fromJson(needs.generate-matrix.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }}
