name: Nix CI

on:
  workflow_call:
    inputs:
      images:
        description: JSON array of flake package names to publish as OCI images to GHCR
        type: string
        default: '[]'
  push:
    branches: [main]
  pull_request:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Check flake
        run: nix flake check

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - id: set-matrix
        run: |
          packages=$(nix eval --json .#packages.x86_64-linux --apply builtins.attrNames 2>/dev/null || echo '[]')
          devShells=$(nix eval --json .#devShells.x86_64-linux --apply \
            'shells: builtins.map (k: "devShells.x86_64-linux.${k}") (builtins.attrNames shells)' 2>/dev/null || echo '[]')
          echo "packages=$(jq -cn --argjson p "$packages" --argjson d "$devShells" '$p + $d')" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [flake-check, generate-matrix]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        package: ${{ fromJson(needs.generate-matrix.outputs.packages) }}
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }}

      # Publish container images
      - name: Is this package a publishable image?
        id: gate
        if: ${{ inputs.images != '' && contains(fromJson(inputs.images), matrix.package) }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref_type }}" = "tag" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Load image
        if: ${{ steps.gate.outputs.publish == 'true' }}
        id: load
        run: |
          image_id=$(docker load -q -i result | sed -n 's/^Loaded image: //p')
          echo "image_id=$image_id" >> "$GITHUB_OUTPUT"

      - name: Compute image ref & tags
        if: ${{ steps.gate.outputs.publish == 'true' }}
        id: meta
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${repo}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
            tags="${image}:${version} ${image}:latest"
          else
            tags="${image}:latest ${image}:sha-${GITHUB_SHA::7}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ steps.gate.outputs.publish == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push
        if: ${{ steps.gate.outputs.publish == 'true' }}
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            echo "Pushing $tag"
            docker tag "${{ steps.load.outputs.image_id }}" "$tag"
            docker push "$tag"
          done
