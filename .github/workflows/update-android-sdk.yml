name: Update Android SDK Versions

on:
  workflow_call:
    inputs:
      nix-file:
        description: Path to the nix file to check and update
        type: string
        default: shell.nix

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Check for Android SDK updates
        id: update
        run: |
          nix run github:SeineEloquenz/ci#check-android-versions -- "${{ inputs.nix-file }}"

      - name: Create or update pull request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Android SDK versions"
          branch: update/android-sdk-versions
          delete-branch: true
          title: "chore: update Android SDK versions"
          body: ${{ steps.update.outputs.pr_body }}
